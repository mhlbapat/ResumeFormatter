app:
  data_dir: data
  log_dir: logs
  log_level: INFO

llm:
  provider: openai
  model: gpt-5-mini
  max_output_tokens: 4000

resume:
  projects_path: data/cv/profile.md
  template_path: templates/resume_template.tex
  output_dir: data/resumes
  candidate_name: Candidate Name
  # Path to the editable system prompt template used for resume generation.
  # The template must include the token `<<FULL_PROFILE_TEXT>>`.
  static_prompt_path: prompts/resume_static_prefix.txt
  # Academic track label shown on generated resumes (not chosen by the LLM).
  phd_degree: Chemical Engineering
  contact:
    email: ""
    phone: ""
    location: ""
    linkedin_handle: ""
  education:
    # Set these to control the Education section in the LaTeX template.
    university_name_phd: ""
    place_phd: ""
    date_phd: ""

    university_name_masters: ""
    place_masters: ""
    masters_degree: ""
    date_masters: ""

    university_name_undergrad: ""
    place_undergrad: ""
    undergrad_degree_name: ""
    date_undergrad: ""

job_search:
  keywords:
    - "software engineer"
    - "data scientist"
  batch_size: 5
  autofill_prompt_path: prompts/autofill_prompt.txt
